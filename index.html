        /* ========== Hero Section ========== */
        .hero {

            position: relative; overflow: hidden; padding-top: 72px;
        }
        .hero::before {
            content: ''; position: absolute; top: -50%; left: -50%;
            width: 200%; height: 200%;
            background: radial-gradient(circle at 30% 50%, rgba(201,169,110,0.08) 0%, transparent 50%),

        .hero-badge {

            border-radius: 50px; font-size: 0.9rem; font-weight: 500;
            margin-bottom: 32px; letter-spacing: 2px;

            line-height: 1.3; margin-bottom: 20px;

        .hero h1 .highlight {

            background-clip: text;

        /* ========== Video Section ========== */
        .video-section { background: var(--bg); }
        .video-grid {

        .video-card:hover { transform: translateY(-4px); box-shadow: var(--shadow-lg); }

            background: linear-gradient(135deg, var(--primary), #1e3a5f);

        .video-thumb:hover .play-btn { transform: scale(1.1); }

            width: 32px; height: 3px; background: var(--accent); border-radius: 2px;

        .footer-col ul { list-style: none; }
        .footer-col ul li { margin-bottom: 10px; }

        /* ========== Animations ========== */
        .fade-in-up {
            opacity: 0; transform: translateY(30px);
            transition: opacity 0.8s ease, transform 0.8s ease;
        }
        .fade-in-up.visible { opacity: 1; transform: translateY(0); }

        /* ========== Responsive ========== */
        @media (max-width: 900px) {
            .nav-links { display: none; }
            .nav-links.open {
                display: flex; flex-direction: column;
                position: absolute; top: 72px; left: 0; right: 0;
                background: rgba(26,54,93,0.98); padding: 20px;

            .nav-toggle { display: block; background: none; border: none; color: white; font-size: 1.5rem; cursor: pointer; }
            .case-detail { grid-template-columns: 1fr; }
            .footer-grid { grid-template-columns: 1fr 1fr; }
            .map-stats { grid-template-columns: 1fr; }
            .map-stat { border-right: none; border-bottom: 1px solid #e2e8f0; }
        }
        @media (max-width: 600px) {
            .hero-stats { grid-template-columns: 1fr 1fr; }
            .footer-grid { grid-template-columns: 1fr; }
            .section { padding: 64px 0; }
        }

        /* ========== Scroll to top ========== */
        .scroll-top {
            position: fixed; bottom: 32px; right: 32px; z-index: 999;
            width: 48px; height: 48px; border-radius: 50%;
            background: var(--primary); color: white; border: none;

            display: flex; align-items: center; justify-content: center;
            font-size: 1.2rem; opacity: 0; transform: translateY(20px);
            transition: all 0.3s;
        }
        .scroll-top.visible { opacity: 1; transform: translateY(0); }
        .scroll-top:hover { background: var(--accent); }
    </style>

<!-- ==================== JavaScript ==================== -->
<script>
    // ===== Navigation =====
    const navToggle = document.getElementById('navToggle');
    const navLinks = document.getElementById('navLinks');
    navToggle.addEventListener('click', () => navLinks.classList.toggle('open'));
    navLinks.querySelectorAll('a').forEach(a => {
        a.addEventListener('click', () => navLinks.classList.remove('open'));
    });

    // ===== Active nav on scroll =====
    const sections = document.querySelectorAll('section[id]');
    window.addEventListener('scroll', () => {
        const scrollY = window.scrollY + 100;
        sections.forEach(section => {
            const top = section.offsetTop - 100;
            const height = section.offsetHeight;
            const id = section.getAttribute('id');
            const link = document.querySelector(`.nav-links a[href="#${id}"]`);
            if (link) {
                if (scrollY >= top && scrollY < top + height) {
                    link.classList.add('active');
                } else {
                    link.classList.remove('active');
                }
            }
        });
    });

    // ===== Scroll to top =====
    const scrollTopBtn = document.getElementById('scrollTop');
    window.addEventListener('scroll', () => {
        scrollTopBtn.classList.toggle('visible', window.scrollY > 400);
    });
    scrollTopBtn.addEventListener('click', () => window.scrollTo({ top: 0, behavior: 'smooth' }));

    // ===== Fade in on scroll =====
    const fadeEls = document.querySelectorAll('.fade-in-up');
    const observer = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
            if (entry.isIntersecting) {
                entry.target.classList.add('visible');
            }
        });
    }, { threshold: 0.15 });
    fadeEls.forEach(el => observer.observe(el));

    // ===== Counter animation =====
    function animateCounters() {
        document.querySelectorAll('.hero-stat .number[data-count]').forEach(el => {
            const target = parseInt(el.dataset.count);
            const prefix = el.dataset.prefix || '';
            const duration = 2000;
            const start = Date.now();
            function update() {
                const elapsed = Date.now() - start;
                const progress = Math.min(elapsed / duration, 1);
                const eased = 1 - Math.pow(1 - progress, 3);
                const current = Math.round(target * eased);
                el.textContent = prefix + current.toLocaleString();
                if (progress < 1) requestAnimationFrame(update);
            }
            update();
        });
    }
    const heroObserver = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
            if (entry.isIntersecting) {
                animateCounters();
                heroObserver.disconnect();
            }
        });
    }, { threshold: 0.5 });
    const heroStats = document.querySelector('.hero-stats');
    if (heroStats) heroObserver.observe(heroStats);

    // ===== Case tabs =====
    function showCase(caseId) {
        document.querySelectorAll('.case-panel').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.case-tab').forEach(t => t.classList.remove('active'));
        const panel = document.getElementById('case-' + caseId);
        if (panel) panel.classList.add('active');
        event.target.classList.add('active');
    }

    // ===== Helix controls =====
    function showHelix(type) {
        document.querySelectorAll('.helix-btn').forEach(b => b.classList.remove('active'));
        event.target.classList.add('active');
        // In a full implementation, this would highlight different parts of the helix
        // For now, just visual feedback
    }

    // ===== Mobile: close nav on outside click =====
    document.addEventListener('click', (e) => {
        if (navLinks.classList.contains('open') && !navLinks.contains(e.target) && e.target !== navToggle) {
            navLinks.classList.remove('open');
        }
    });
</script>
