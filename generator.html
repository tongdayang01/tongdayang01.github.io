<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>四真三化五链三场 · 教学设计一键生成系统 V3.0【顶级版】</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700;900&family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #C9A96E;
            --gold-light: #E8D5A3;
            --gold-dark: #8B7340;
            --dark: #0A0E1A;
            --dark2: #111827;
            --text: #E8E8E8;
            --text-dim: #8A8A9A;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Noto Sans SC', sans-serif;
            background: var(--dark);
            color: var(--text);
            min-height: 100vh;
            line-height: 1.8;
        }
        .container { max-width: 1400px; margin: 0 auto; padding: 40px 20px; }

        /* 头部 */
        .header { text-align: center; margin-bottom: 48px; }
        h1 {
            font-family: 'Noto Serif SC', serif;
            font-size: 2.2rem;
            margin-bottom: 8px;
            background: linear-gradient(135deg, var(--gold), var(--gold-light));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .subtitle { color: var(--text-dim); margin-bottom: 12px; font-size: 0.95rem; }
        .version { color: var(--gold); font-size: 0.8rem; letter-spacing: 2px; }

        /* 输入区 */
        .input-section {
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 16px;
            padding: 36px;
            margin-bottom: 40px;
        }
        .input-section h2 { font-size: 1.2rem; color: var(--gold); margin-bottom: 8px; }
        .input-section .desc { color: var(--text-dim); font-size: 0.85rem; margin-bottom: 28px; line-height: 1.6; }

        .form-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 24px; margin-bottom: 28px; }
        .form-group { }
        .form-group label { display: block; font-size: 0.85rem; color: var(--gold-light); margin-bottom: 8px; font-weight: 500; }
        .form-group input, .form-group select, .form-group textarea {
            width: 100%; padding: 14px 18px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 10px;
            color: var(--text);
            font-size: 0.95rem;
            font-family: inherit;
            transition: all 0.3s;
        }
        .form-group input:focus, .form-group select:focus, .form-group textarea:focus {
            outline: none;
            border-color: var(--gold);
            box-shadow: 0 0 0 3px rgba(201,169,110,0.15);
            background: rgba(255,255,255,0.08);
        }
        textarea { min-height: 90px; resize: vertical; }

        .btn-generate {
            display: block;
            width: 100%;
            max-width: 600px;
            margin: 0 auto;
            padding: 20px 48px;
            background: linear-gradient(135deg, var(--gold-dark), var(--gold));
            color: #0A0E1A;
            font-size: 1.25rem;
            font-weight: 900;
            border: none;
            border-radius: 14px;
            cursor: pointer;
            transition: all 0.3s;
            letter-spacing: 3px;
            font-family: 'Noto Serif SC', serif;
        }
        .btn-generate:hover { transform: translateY(-3px); box-shadow: 0 16px 48px rgba(201,169,110,0.45); }
        .btn-generate:active { transform: translateY(-1px); }

        /* 加载 */
        .loading { text-align: center; padding: 100px 20px; color: var(--text-dim); font-size: 1.1rem; display: none; }
        .loading::after {
            content: '';
            display: inline-block;
            width: 28px; height: 28px;
            border: 3px solid var(--gold);
            border-top-color: transparent;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-left: 14px;
            vertical-align: middle;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* 输出区 */
        .output-section { display: none; }
        .output-header {
            text-align: center;
            margin-bottom: 40px;
            padding-bottom: 24px;
            border-bottom: 1px solid rgba(255,255,255,0.06);
        }
        .output-header h2 {
            font-family: 'Noto Serif SC', serif;
            font-size: 1.8rem;
            background: linear-gradient(135deg, var(--gold), var(--gold-light));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 8px;
        }
        .output-meta { color: var(--text-dim); font-size: 0.85rem; }

        .section-card {
            background: rgba(255,255,255,0.025);
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 14px;
            padding: 32px;
            margin-bottom: 28px;
            position: relative;
        }
        .section-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0;
            width: 4px; height: 100%;
            background: linear-gradient(180deg, var(--gold), transparent);
            border-radius: 4px 0 0 4px;
        }
        .section-card h3 {
            font-size: 1.15rem;
            color: var(--gold);
            margin-bottom: 20px;
            padding-bottom: 12px;
            border-bottom: 1px solid rgba(255,255,255,0.06);
            font-family: 'Noto Serif SC', serif;
        }
        .section-card h4 {
            font-size: 1.0rem;
            color: var(--gold-light);
            margin: 20px 0 12px 0;
            font-weight: 700;
        }
        .section-card p, .section-card li {
            color: var(--text);
            font-size: 0.92rem;
            line-height: 1.9;
            margin-bottom: 8px;
        }
        .section-card ul, .section-card ol { padding-left: 24px; }
        .section-card li { margin-bottom: 6px; }

        .tag {
            display: inline-block;
            padding: 4px 14px;
            background: rgba(201,169,110,0.12);
            border: 1px solid rgba(201,169,110,0.25);
            border-radius: 20px;
            font-size: 0.8rem;
            color: var(--gold-light);
            margin: 4px 6px 4px 0;
        }

        .btn-group { display: flex; gap: 12px; margin-top: 20px; flex-wrap: wrap; }
        .btn-copy, .btn-download {
            padding: 10px 24px;
            border-radius: 10px;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.25s;
            font-family: inherit;
            font-weight: 500;
        }
        .btn-copy {
            background: rgba(201,169,110,0.12);
            border: 1px solid rgba(201,169,110,0.3);
            color: var(--gold-light);
        }
        .btn-copy:hover { background: rgba(201,169,110,0.22); }
        .btn-download {
            background: rgba(255,255,255,0.06);
            border: 1px solid rgba(255,255,255,0.12);
            color: var(--text-dim);
        }
        .btn-download:hover { background: rgba(255,255,255,0.1); }

        .sop-table {
            width: 100%;
            border-collapse: collapse;
            margin: 16px 0;
            font-size: 0.88rem;
        }
        .sop-table th, .sop-table td {
            padding: 12px 16px;
            border: 1px solid rgba(255,255,255,0.08);
            text-align: left;
        }
        .sop-table th {
            background: rgba(201,169,110,0.1);
            color: var(--gold-light);
            font-weight: 600;
        }

        .highlight-box {
            background: rgba(201,169,110,0.06);
            border-left: 3px solid var(--gold);
            padding: 16px 20px;
            margin: 16px 0;
            border-radius: 0 10px 10px 0;
            font-size: 0.9rem;
            color: var(--text-dim);
            line-height: 1.8;
        }

        @media (max-width: 768px) {
            h1 { font-size: 1.6rem; }
            .form-grid { grid-template-columns: 1fr; }
            .section-card { padding: 20px; }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>四真三化五链三场<br>教学设计一键生成系统</h1>
        <div class="subtitle">基于宁强县职业高级中学国家级教学成果奖顶层设计 · 输入3项 · 输出8大核心成果</div>
        <div class="version">V3.0 顶级版 · 国家级特等奖水准 · 2026年6月</div>
    </div>

    <div class="input-section">
        <h2>⚡ 极简输入（只需3项核心信息）</h2>
        <div class="desc">
            本系统严格遵循《从"学科拼盘"到"产业战场"》顶层设计文档：输入专业名称、学科名称、项目名称3项信息，<br>
            系统自动匹配产业需求与岗位标准，一键输出8大核心成果，覆盖从人才培养到教学实施、从评价标准到落地保障的全流程。
        </div>
        <div class="form-grid">
            <div class="form-group">
                <label>① 专业名称（你的专业是什么？）</label>
                <input type="text" id="major" placeholder="例：烹饪工艺与营养 / 中医美容康复 / 计算机应用 / 汽车工程" value="烹饪工艺与营养">
            </div>
            <div class="form-group">
                <label>② 学科/课程名称（你教哪门课？）</label>
                <input type="text" id="subject" placeholder="例：中式烹调技术 / 语文 / 数学 / 英语 / 信息技术（不限专业课或文化课）" value="中式烹调技术">
            </div>
            <div class="form-group">
                <label>③ 项目/产品名称（学生要做成什么产品？）</label>
                <input type="text" id="project" placeholder="例：麻婆豆腐 / 天麻煲土鸡 / 中医理疗服务 / 轻食外卖套餐" value="麻婆豆腐">
            </div>
        </div>
        <button class="btn-generate" onclick="generateAll()">⚡ 一键生成 · 8大核心成果</button>
    </div>

    <div class="loading" id="loading">正在基于"四真三化五链三场"框架生成教学成果，预计30秒…</div>

    <div class="output-section" id="output">
        <div class="output-header">
            <h2 id="out-title">生成完毕 · 8大核心成果</h2>
            <div class="output-meta" id="out-meta"></div>
        </div>
        <div id="results"></div>
    </div>
</div>

<script>
// ========== 知识库 ==========
const knowledgeBase = {
    "烹饪工艺与营养": {
        jobs: ["炒锅厨师", "砧板厨师", "冷菜厨师", "中点师", "西点师", "厨房管理"],
        skills: ["刀工", "火候控制", "调味", "食材鉴别", "成本核算", "菜品设计", "食品安全", "营养配餐"],
        products: ["麻婆豆腐", "天麻煲土鸡", "鱼香肉丝", "宫保鸡丁", "轻食沙拉", "药膳汤煲"]
    },
    "中医美容康复": {
        jobs: ["康复技师", "美容师", "推拿师", "养生顾问", "健康管理师"],
        skills: ["推拿手法", "经络穴位", "艾灸理疗", "皮肤护理", "健康评估", "客户沟通"],
        products: ["推拿理疗服务", "艾灸养生套餐", "美容护理方案", "健康管理计划"]
    },
    "计算机应用": {
        jobs: ["前端开发", "短视频剪辑", "UI设计", "电商运营", "网络维护"],
        skills: ["HTML/CSS", "JavaScript", "视频剪辑", "图像处理", "数据分析", "网络配置"],
        products: ["产品宣传网页", "产品短视频", "产品海报设计", "电商详情页"]
    },
    "语文": {
        jobs: ["产品文案", "品牌策划", "新媒体运营", "企业宣传"],
        skills: ["文案写作", "故事叙述", "演讲表达", "阅读理解", "创意写作"],
        products: ["产品故事", "路演演讲稿", "品牌文案", "客户感谢信"]
    },
    "数学": {
        jobs: ["成本核算", "数据分析", "质量管理", "采购计划"],
        skills: ["成本计算", "利润分析", "配方比例", "数据统计"],
        products: ["成本核算表", "利润分析报告", "采购预算表"]
    },
    "英语": {
        jobs: ["外文菜单", "涉外服务", "跨境客服", "国际营销"],
        skills: ["菜单翻译", "服务用语", "营销文案", "客户沟通"],
        products: ["外文菜单", "英文宣传文案", "涉外服务手册"]
    }
};

// ========== 生成主逻辑 ==========
function generateAll() {
    const major = document.getElementById('major').value.trim();
    const subject = document.getElementById('subject').value.trim();
    const project = document.getElementById('project').value.trim();

    if (!major || !subject || !project) {
        alert('请填写全部3项信息！');
        return;
    }

    document.getElementById('loading').style.display = 'block';
    document.getElementById('output').style.display = 'none';

    setTimeout(() => {
        const d = { major, subject, project };
        d.kb = knowledgeBase[major] || knowledgeBase['烹饪工艺与营养'];

        renderAll(d);
        document.getElementById('loading').style.display = 'none';
        document.getElementById('output').style.display = 'block';
        document.getElementById('out-title').textContent = `生成完毕 · ${major}《${subject}》×《${project}》· 8大核心成果`;
        document.getElementById('out-meta').textContent = `基于"四真三化五链三场"框架生成 · ${new Date().toLocaleString('zh-CN')}`;
        document.getElementById('output').scrollIntoView({ behavior: 'smooth' });
    }, 800);
}

function renderAll(d) {
    const container = document.getElementById('results');
    container.innerHTML = '';

    // 8大成果
    const sections = [
        { id: 1, title: '① 精准产业画像与专业定位', fn: renderSection1 },
        { id: 2, title: '② 贴合岗位需求的人才培养方案', fn: renderSection2 },
        { id: 3, title: '③ 基于产品项目的课程设计与教学设计', fn: renderSection3 },
        { id: 4, title: '④ 可直接用于课堂的标准化工作工单（SOP）', fn: renderSection4 },
        { id: 5, title: '⑤ 市场导向的多维评价标准', fn: renderSection5 },
        { id: 6, title: '⑥ 文化课与专业课深度融合方案', fn: renderSection6 },
        { id: 7, title: '⑦ 复刻企业工作手册的真活页讲义', fn: renderSection7 },
        { id: 8, title: '⑧ 常态化运行保障机制', fn: renderSection8 }
    ];

    sections.forEach(s => {
        const card = document.createElement('div');
        card.className = 'section-card';
        card.id = `section-${s.id}`;
        card.innerHTML = `<h3>${s.title}</h3><div id="sec-content-${s.id}"></div>`;
        container.appendChild(card);
        s.fn(d, document.getElementById(`sec-content-${s.id}`));
    });
}

// ========== 成果①：产业画像与专业定位 ==========
function renderSection1(d, el) {
    el.innerHTML = `
        <p>本专业聚焦<strong>"四真"</strong>体系，将产业需求精准映射为专业定位：</p>
        <h4>🏭 真实产业画像</h4>
        <p>专业：<strong>${d.major}</strong></p>
        <p>聚焦产业：宁强天麻药食同源产业链、康养服务产业链、烹饪（陕南特色菜系）产业链</p>
        <p>产业规模：宁强天麻年产值约<strong>3.2亿元</strong>，带动就业约1200人/年；本地餐饮企业技能人才缺口约<strong>1200人/年</strong></p>
        <p>核心企业：宁强县天麻产业园、羌州希尔顿酒店、本地中医药企业、值餐工坊（校内自建产业）</p>
        <div style="margin-top:12px">
            <span class="tag">天麻产业</span><span class="tag">药食同源</span><span class="tag">康养服务</span><span class="tag">陕南特色餐饮</span>
        </div>

        <h4>📍 专业定位（三句话）</h4>
        <p>第一句：本专业不是"学做菜"，而是培养<strong>"能造被市场认可产品的价值创造者"</strong></p>
        <p>第二句：以"一块豆腐"（${d.project}）为最小产品单元，串起语文、数学、英语、专业课所有课程</p>
        <p>第三句：毕业要求不是"考多少分"，而是"客户好评率>85%，企业抢聘率>80%"</p>

        <h4>🗺️ 专业-岗位-能力图谱（节选）</h4>
        <table class="sop-table">
            <tr><th>专业方向</th><th>对应岗位</th><th>核心能力（拆解到最小颗粒度）</th></tr>
            ${d.kb.jobs.map(j => `<tr><td>${d.major}</td><td>${j}</td><td>${d.kb.skills.join('、')}</td></tr>`).join('')}
        </table>
        <div class="btn-group">
            <button class="btn-copy" onclick="copySection(1)">📋 复制本节内容</button>
            <button class="btn-download" onclick="downloadSection(1)">⬇ 下载本节为TXT</button>
        </div>
    `;
}

// ========== 成果②：人才培养方案 ==========
function renderSection2(d, el) {
    const totalHours = 144;  // 每学期总课时
    const weeks = 18;
    const hoursPerWeek = Math.round(totalHours / weeks);
    el.innerHTML = `
        <p>人才培养方案完全基于<strong>岗位能力清单</strong>逆向设计，不按学科逻辑，按产业逻辑：</p>
        <h4>🎯 人才培养目标（三维度）</h4>
        <p><strong>硬技能维度</strong>：熟练掌握${d.kb.skills.slice(0,4).join('、')}等核心技能，达到世界技能大赛标准</p>
        <p><strong>软素养维度</strong>：具备客户沟通、团队协作、问题解决、工匠精神</p>
        <p><strong>商业思维维度</strong>：能核算成本、制定定价、完成产品交付、获取客户好评</p>

        <h4>📅 学期课程安排（以18周/学期为例）</h4>
        <table class="sop-table">
            <tr><th>学期</th><th>核心课程</th><th>产业项目载体</th><th>课时/周</th></tr>
            <tr><td>第1学期</td><td>专业基础模块（刀工/火候/调味基本功）</td><td>${d.project}基础版</td><td>${hoursPerWeek}课时</td></tr>
            <tr><td>第2学期</td><td>岗位技能模块（${d.kb.jobs[0]}方向深化）</td><td>${d.project}升级版+值餐工坊真实订单</td><td>${hoursPerWeek}课时</td></tr>
            <tr><td>第3学期</td><td>产业实战模块（校内自建产业链运营）</td><td>值餐工坊/悦舍理疗中心/暑期夜市实战</td><td>${hoursPerWeek}课时</td></tr>
            <tr><td>第4学期</td><td>综合提升模块（世赛标准训练+职教高考备考）</td><td>世赛模拟赛+产品博览会</td><td>${hoursPerWeek}课时</td></tr>
        </table>

        <h4>🔗 五链贯通逻辑</h4>
        <p><strong>岗位链</strong>：基础操作岗 → 熟练技工岗 → 产品线管理岗 → 创业老板（四阶晋升路径）</p>
        <p><strong>任务链</strong>：原料鉴别 → 技能操作 → 产品制作 → 品控检验 → 市场路演（五步流程）</p>
        <p><strong>技能链</strong>：${d.kb.skills.map((s,i) => `${i+1}.${s}`).join(' → ')}（逐项过关）</p>
        <p><strong>工具链</strong>：对标企业标准配置（专业厨具/理疗设备/宣传工具），学校用的=企业用的</p>
        <p><strong>评价链</strong>：教师25% + 企业25% + 客户30% + 团队10% + 自评10%（市场说了算占比>55%）</p>
        <div class="btn-group">
            <button class="btn-copy" onclick="copySection(2)">📋 复制本节内容</button>
            <button class="btn-download" onclick="downloadSection(2)">⬇ 下载本节为TXT</button>
        </div>
    `;
}

// ========== 成果③：课程设计与教学设计 ==========
function renderSection3(d, el) {
    const lessons = [
        { num: 1, title: `${d.project}（一）：刀工与食材处理`, module: '技能链·刀工过关' },
        { num: 2, title: `${d.project}（二）：火候控制与调味`, module: '技能链·火候过关' },

// ========== 工具函数 ==========
function copySection(id) {
    const el = document.getElementById(`sec-content-${id}`);
    const text = el.innerText || el.textContent;
    navigator.clipboard.writeText(text).then(() => {
        const btn = el.parentElement.querySelector('.btn-copy');
        btn.textContent = '✅ 已复制！';
        setTimeout(() => btn.textContent = '📋 复制本节内容', 2000);
    });
}

function downloadSection(id) {
    const el = document.getElementById(`sec-content-${id}`);
    const text = el.innerText || el.textContent;
    const title = document.querySelector(`#section-${id} h3`).textContent;
    const blob = new Blob([text], { type: 'text/plain;charset=utf-8' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = `${title.replace(/[①②②③④⑤⑥⑦⑧⑨⑩]/g, '').trim()}.txt`;
    a.click();
    URL.revokeObjectURL(a.href);
}
